<style>
:root{
  --bg:#f7f3ec; --text:#2c2416; --text2:#5a4e3a; --text-muted:#6B5B4B;
  --accent:#8b5e3c; --accentL:#c4956a; --accent-red:#8B2500;
  --gold:#b8860b; --goldL:#d4a84b; --gold-light:#C9A84C;
  --border:#d4c4a8; --border-light:#EDE8E0; --card:#fffdf7;
  --verseBg:#f0e8d8; --verseBd:#c4956a;
  --sbW:76px; --sbBg:#1e1a14; --sbText:#d4c4a8;
  --headGrad:linear-gradient(135deg,#2a2218 0%,#3d3225 50%,#2a2218 100%);
  --r:8px;
}
*{box-sizing:border-box;-webkit-user-select:none;-moz-user-select:none;-ms-user-select:none;user-select:none;-webkit-touch-callout:none;}
html,body{margin:0;padding:0;background:var(--bg);color:var(--text);
  font-family:"Noto Serif TC","Source Han Serif TC","Songti TC",Georgia,serif;
  line-height:1.8;scroll-behavior:smooth;
  scrollbar-width:none;-ms-overflow-style:none;}
html::-webkit-scrollbar,body::-webkit-scrollbar{display:none;width:0;height:0;}
a{color:inherit;text-decoration:none;}
img{-webkit-user-drag:none;pointer-events:none;}

/* ── 側欄 ── */
#sb{position:fixed;left:0;top:0;width:var(--sbW);height:100vh;
  background:var(--sbBg);color:var(--sbText);z-index:100;
  display:flex;flex-direction:column;align-items:center;
  padding:0 0 16px;overflow-y:auto;scrollbar-width:none;}
#sb::-webkit-scrollbar{display:none;}
.sb-brand{position:sticky;top:0;width:100%;
  font-family:"Noto Sans TC",sans-serif;font-size:11px;letter-spacing:2px;
  color:var(--gold);writing-mode:horizontal-tb;text-orientation:mixed;
  text-align:center;line-height:1.5;
  background:linear-gradient(to bottom,var(--sbBg) 78%,rgba(30,26,20,0));
  padding:14px 4px 12px;margin-bottom:6px;z-index:5;
  text-decoration:none;cursor:pointer;
  transition:color .25s,background .25s;display:block;
  border-bottom:1px solid rgba(184,134,11,.25);}
.sb-brand:hover{color:var(--goldL);}
.sb-brand .sb-brand-line1{display:block;font-size:11px;letter-spacing:1.5px;opacity:.78;}
.sb-brand .sb-brand-line2{display:block;font-size:13px;font-weight:700;letter-spacing:2.2px;color:var(--goldL);margin-top:2px;}
.sb-brand .sb-brand-arrow{display:block;font-size:10px;opacity:.55;margin-top:2px;}
.sb-nav{display:flex;flex-direction:column;align-items:center;gap:6px;width:100%;}
.sb-item{display:flex;flex-direction:column;align-items:center;
  padding:3px 4px;cursor:pointer;text-decoration:none;color:inherit;
  transition:background .2s;border-radius:6px;width:88%;}
.sb-item:hover{background:rgba(184,134,11,.1);}
.sb-item.active{background:rgba(184,134,11,.25);box-shadow:0 0 12px rgba(184,134,11,.4);}
.sb-circle{display:inline-flex;align-items:center;justify-content:center;
  width:34px;height:34px;border-radius:50%;
  background:linear-gradient(135deg,#3d3225,#2a2218);
  border:1.5px solid rgba(184,134,11,.4);
  color:var(--goldL);font-weight:700;font-size:15px;
  font-family:"Noto Sans TC",sans-serif;}
.sb-item.active .sb-circle{
  background:linear-gradient(135deg,var(--gold),var(--goldL));
  color:#fff;border-color:var(--goldL);}
.sb-label{display:block;font-size:11.5px;text-align:center;
  margin-top:4px;letter-spacing:.5px;color:var(--sbText);line-height:1.3;}
.sb-item.active .sb-label{color:var(--goldL);font-weight:600;}

/* ── 漢堡按鈕（手機）── */
#sbToggle{position:fixed;top:14px;left:14px;width:42px;height:42px;
  border-radius:50%;background:var(--sbBg);color:var(--gold);
  border:1px solid var(--gold);z-index:101;cursor:pointer;
  display:none;font-size:18px;line-height:1;}

/* ── Hero ── */
.main{margin-left:var(--sbW);padding:0;min-height:0;}
.site-hero{
  position:relative;background:var(--headGrad);
  padding:90px 24px 70px;text-align:center;color:#fff;
  overflow:hidden;}
.site-hero::before{
  content:"般若";position:absolute;left:50%;top:50%;transform:translate(-50%,-50%);
  font-size:280px;font-weight:900;color:#fff;opacity:.035;letter-spacing:60px;
  pointer-events:none;white-space:nowrap;}
.hero-content{position:relative;z-index:2;max-width:920px;margin:0 auto;}
.hero-title{font-size:56px;font-weight:900;color:var(--goldL);letter-spacing:14px;margin:0 0 14px;}
.hero-subtitle{font-size:20px;color:#e8d9b6;letter-spacing:8px;margin:0 0 20px;}
.hero-sub{font-family:"Noto Sans TC",sans-serif;font-size:18px;color:#c4956a;letter-spacing:6px;margin:0 0 16px;text-transform:uppercase;}
.hero-range{display:inline-block;font-size:17px;color:#d4c4a8;letter-spacing:4px;
  padding:10px 28px;border:1px solid rgba(184,134,11,.5);border-radius:30px;margin-top:10px;}

/* ── 編者前言 ── */
.preface{max-width:920px;margin:0 auto;padding:50px 24px 30px;}
.preface-title{text-align:center;font-size:30px;color:var(--accent);letter-spacing:8px;margin:0 0 26px;}
.preface-title::after{content:"";display:block;width:60px;height:2px;background:var(--gold);margin:14px auto 0;}
.preface p{font-size:19px;line-height:2.1;color:var(--text2);margin:0 0 18px;text-align:justify;}
.preface strong{color:var(--accent-red);font-weight:600;}

/* ── 總目錄 ── */
.toc-section{max-width:1100px;margin:30px auto 50px;padding:34px 24px;
  background:var(--card);border:1px solid var(--border);border-radius:14px;
  box-shadow:0 4px 18px rgba(91,58,41,.08);}
.toc-title{text-align:center;font-size:34px;color:var(--accent);letter-spacing:12px;margin:0 0 10px;}
.toc-desc{text-align:center;font-size:17px;color:var(--text-muted);letter-spacing:3px;margin:0 0 28px;}
.toc-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:16px;}
.toc-card{display:flex;gap:14px;align-items:flex-start;padding:14px 18px;
  background:linear-gradient(135deg,#fffdf5,#f5ecd8);
  border:1px solid var(--border);border-left:4px solid var(--gold);
  border-radius:10px;transition:transform .2s,box-shadow .2s;cursor:pointer;
  text-decoration:none;color:inherit;}
.toc-card:hover{transform:translateX(4px);box-shadow:0 4px 12px rgba(91,58,41,.12);}
.toc-num{flex-shrink:0;width:36px;height:36px;border-radius:50%;
  display:flex;align-items:center;justify-content:center;
  background:linear-gradient(135deg,var(--gold),var(--goldL));color:#fff;
  font-size:17px;font-weight:700;font-family:"Noto Sans TC",sans-serif;
  margin-top:2px;}
.toc-name{font-size:19.5px;line-height:1.7;color:var(--text);font-weight:500;}
.toc-sub{display:block;font-size:14px;color:var(--text-muted);margin-top:4px;font-weight:400;}

/* ── 章節（每品） ── */
.chapter{margin:30px 0 60px;}
.ch-head{
  background:var(--headGrad);color:#fff;
  padding:48px 24px 38px;text-align:center;position:relative;
  border-top:1px solid rgba(184,134,11,.3);
  border-bottom:3px solid var(--gold);}
.ch-head::after{
  content:"";display:block;width:80px;height:1px;background:var(--gold);
  margin:18px auto 0;}
.ch-num{font-family:"Noto Sans TC",sans-serif;font-size:18px;
  color:var(--goldL);letter-spacing:6px;margin:0 0 10px;opacity:.92;}
.ch-name{font-size:34px;font-weight:700;color:#fff;letter-spacing:4px;margin:0 0 12px;}
.ch-sub{font-size:17px;color:#d4c4a8;letter-spacing:2px;margin:0;}
.ch-body{max-width:980px;margin:0 auto;padding:30px 16px;}

/* ── 章節橋接 ── */
.bridge{
  background:linear-gradient(135deg,#fffdf5,#f5ecd8);
  border:1px solid var(--border);border-left:5px solid var(--gold);
  border-radius:10px;padding:18px 24px;margin:0 0 26px;
  box-shadow:0 2px 10px rgba(91,58,41,.06);}
.bridge-outro{
  border-left-color:var(--accentL);
  background:linear-gradient(135deg,#fdf8e8,#f2e6c8);
  margin-top:30px;margin-bottom:14px;}
.bridge-label{display:inline-block;
  font-family:"Noto Sans TC",sans-serif;font-size:12.5px;
  background:var(--gold);color:#fff;
  padding:3px 12px;border-radius:12px;
  letter-spacing:2.2px;margin-bottom:10px;}
.bridge-outro .bridge-label{background:var(--accent);}
.bridge p{margin:0;color:var(--text2);line-height:2.1;font-size:18.5px;}

/* ── iframe ── */
.ch-frame{display:block;width:100%;border:0;background:#fffdf7;
  border:1px solid var(--border);border-radius:12px;
  box-shadow:0 4px 20px rgba(91,58,41,.1);
  margin:0 0 8px;min-height:180px;}

.next-link{display:inline-block;margin:14px 0 4px;padding:9px 20px;
  background:var(--gold);color:#fff;border-radius:24px;
  font-family:"Noto Sans TC",sans-serif;font-size:17px;letter-spacing:2px;
  transition:transform .2s,background .2s;}
.next-link:hover{background:var(--goldL);transform:translateX(4px);}

/* ── 進度膠囊 ── */
.read-progress{
  position:fixed;left:50%;bottom:18px;transform:translateX(-50%);
  z-index:120;background:rgba(30,26,20,.92);color:var(--gold);
  padding:9px 24px;border-radius:30px;
  border:1px solid rgba(184,134,11,.5);
  box-shadow:0 4px 18px rgba(0,0,0,.25);
  font-family:"Noto Sans TC",sans-serif;
  font-size:14px;letter-spacing:2px;
  display:flex;align-items:center;gap:12px;
  pointer-events:none;user-select:none;backdrop-filter:blur(6px);
  transition:opacity .45s ease,transform .45s ease;}
.read-progress.hide-near-end{opacity:0;transform:translateX(-50%) translateY(28px);}
.read-progress .rp-bar{width:148px;height:4px;background:rgba(212,196,168,.18);
  border-radius:2px;overflow:hidden;position:relative;}
.read-progress .rp-fill{position:absolute;top:0;left:0;bottom:0;
  background:linear-gradient(90deg,var(--gold),var(--goldL));
  width:0%;transition:width .3s;}
.read-progress .rp-pct{font-weight:600;min-width:38px;text-align:right;font-size:13px;}
.read-progress .rp-label{font-size:12px;opacity:.85;letter-spacing:4px;color:var(--goldL);}

/* ── 回頂按鈕 ── */
#backTop{position:fixed;right:24px;bottom:24px;width:44px;height:44px;
  border-radius:50%;background:var(--accent);color:#fff;
  border:0;display:none;cursor:pointer;font-size:20px;z-index:110;
  box-shadow:0 4px 14px rgba(0,0,0,.2);}

/* ── 頁尾 ── */
.site-footer{max-width:920px;margin:50px auto 110px;padding:24px;
  text-align:center;font-size:15px;color:var(--text-muted);
  border-top:1px solid var(--border);line-height:2;}

/* ── 響應式 ── */
@media (max-width:900px){
  #sb{transform:translateX(-100%);transition:transform .3s;}
  #sb.open{transform:translateX(0);}
  #sbToggle{display:flex;align-items:center;justify-content:center;}
  .main{margin-left:0;}
  .site-hero{padding:70px 18px 50px;}
  .hero-title{font-size:42px;letter-spacing:8px;}
  .ch-head{padding:36px 18px 28px;}
  .ch-name{font-size:26px;letter-spacing:2px;}
  .toc-grid{grid-template-columns:1fr;}
}
@media (max-width:600px){
  body{font-size:18px;}
  .hero-title{font-size:34px;letter-spacing:4px;}
  .hero-subtitle{font-size:16px;letter-spacing:4px;}
  .ch-name{font-size:22px;}
}
</style>

<button aria-label="回到頂部" id="backTop">↑</button>
<script>
(function(){
  // ── 防複製 ──
  var blk=function(e){e.preventDefault();return false;};
  ['contextmenu','copy','cut','selectstart','dragstart','mousedown'].forEach(function(ev){
    document.addEventListener(ev,function(e){
      if(ev==='mousedown' && e.button!==2) return;
      blk(e);
    },true);
  });
  document.addEventListener('keydown',function(e){
    var k=e.key;
    if(e.ctrlKey&&(k==='c'||k==='C'||k==='a'||k==='A'||k==='s'||k==='S'||k==='p'||k==='P'||k==='u'||k==='U'||k==='x'||k==='X')){blk(e);}
    if(k==='F12')blk(e);
    if(e.ctrlKey&&e.shiftKey&&(k==='I'||k==='J'||k==='C'||k==='K')){blk(e);}
  },true);

  // ── sticky brand 平滑回頂 ──
  var sbBrand=document.getElementById('sbBrand');
  if(sbBrand){
    sbBrand.addEventListener('click',function(e){
      e.preventDefault();
      window.scrollTo({top:0,behavior:'smooth'});
    });
  }

  // ── 漢堡選單 ──
  var sb=document.getElementById('sb');
  var tg=document.getElementById('sbToggle');
  if(tg && sb){
    tg.addEventListener('click',function(){sb.classList.toggle('open');});
  }

  // ── 側欄高亮 + 進度 ──
  var chapters=document.querySelectorAll('.chapter');
  var sbItems=document.querySelectorAll('.sb-item');
  var rpFill=document.getElementById('rpFill');
  var rpPct=document.getElementById('rpPct');
  function updateProgress(){
    var sh=document.documentElement.scrollHeight-window.innerHeight;
    var pct=sh>0?Math.min(100,Math.max(0,window.scrollY/sh*100)):0;
    if(rpFill) rpFill.style.width=pct+'%';
    if(rpPct)  rpPct.textContent=Math.round(pct)+'%';
  }
  function highlightSidebar(){
    var act=-1;
    var threshold=window.innerHeight*0.35;
    chapters.forEach(function(c,i){
      var top=c.getBoundingClientRect().top;
      if(top<threshold) act=i;
    });
    sbItems.forEach(function(item,i){
      item.classList.toggle('active',i===act);
    });
    // 自動捲動 sidebar 使 active 可見
    if(act>=0 && sbItems[act]){
      var item=sbItems[act];
      var sbEl=document.getElementById('sb');
      if(sbEl){
        var ir=item.getBoundingClientRect();
        var sr=sbEl.getBoundingClientRect();
        if(ir.top<sr.top+60 || ir.bottom>sr.bottom-60){
          sbEl.scrollTop+=ir.top-sr.top-sr.height/2+ir.height/2;
        }
      }
    }
  }
  // 接近頁尾膠囊淡出
  var cap=document.getElementById('readProgress');
  function setHide(on){if(cap)cap.classList.toggle('hide-near-end',!!on);}
  var foots=[];
  var f1=document.querySelector('.site-footer');
  if(f1) foots.push(f1);
  if(foots.length && 'IntersectionObserver' in window){
    var io=new IntersectionObserver(function(entries){
      var any=entries.some(function(e){return e.isIntersecting;});
      setHide(any);
    },{root:null,rootMargin:'0px 0px -20px 0px',threshold:0.01});
    foots.forEach(function(t){io.observe(t);});
  }

  // ── 回頂按鈕 ──
  var bt=document.getElementById('backTop');
  function tickScroll(){
    updateProgress();
    highlightSidebar();
    if(bt){bt.style.display=window.scrollY>600?'block':'none';}
  }
  window.addEventListener('scroll',tickScroll,{passive:true});
  tickScroll();
  if(bt){bt.addEventListener('click',function(){window.scrollTo({top:0,behavior:'smooth'});});}

  // ── iframe 自動高度 ──
  function resizeFrame(f){
    try{
      var d=f.contentDocument||f.contentWindow.document;
      if(!d||!d.body) return;
      d.body.style.minHeight='0';
      d.body.style.height='auto';
      if(d.documentElement){
        d.documentElement.style.minHeight='0';
        d.documentElement.style.height='auto';
      }
      var h=d.body.scrollHeight;
      if(h>100){
        f.style.height=h+'px';
        f.style.minHeight='0';
      }
    }catch(e){}
  }
  function resizeAllFrames(){
    document.querySelectorAll('iframe.ch-frame').forEach(resizeFrame);
    updateProgress();
  }
  function setupFrame(f){
    var tries=0;
    function tick(){
      tries++;
      resizeFrame(f);
      if(tries<30) setTimeout(tick,200);
    }
    if(f.contentDocument && f.contentDocument.readyState==='complete'){
      tick();
    } else {
      f.addEventListener('load',tick);
    }
  }
  document.querySelectorAll('iframe.ch-frame').forEach(setupFrame);
  var rzT;
  window.addEventListener('resize',function(){
    clearTimeout(rzT);rzT=setTimeout(resizeAllFrames,200);
  });

  // ── 錨點點擊防錯跳 ──
  document.addEventListener('click',function(e){
    var a=e.target;
    while(a&&a.tagName!=='A') a=a.parentElement;
    if(!a) return;
    var h=a.getAttribute('href');
    if(!h||h.charAt(0)!=='#'||h.length<2) return;
    var id=h.substring(1);
    var el=document.getElementById(id);
    if(!el) return;
    e.preventDefault();
    resizeAllFrames();
    setTimeout(function(){
      resizeAllFrames();
      var rect=el.getBoundingClientRect();
      var y=window.scrollY+rect.top-20;
      window.scrollTo({top:y,behavior:'smooth'});
    },60);
  },true);

  // ── 前 15 秒持續輪詢，配合字型/iframe reflow ──
  var _rt=0,_riv=setInterval(function(){
    _rt++;resizeAllFrames();
    if(_rt>50) clearInterval(_riv);
  },300);
})();
</script>

<script id="wy-print-intercept">
(function(){
  try{ window.print = function(){}; }catch(e){}
  document.addEventListener("keydown", function(e){
    if((e.metaKey||e.ctrlKey) && (e.key==="p"||e.key==="P"||e.keyCode===80)){
      e.preventDefault(); e.stopPropagation();
      return false;
    }
  }, true);
})();
</script>
<script id="wy-decoder">
(function(){
  if(!window.__wyReady) return;
  var KEY = "wy53dzdl-v1";
  function _dec(b64){
    try{
      var raw = atob(b64);
      var bytes = new Uint8Array(raw.length);
      for(var i=0;i<raw.length;i++){
        bytes[i] = (raw.charCodeAt(i) ^ KEY.charCodeAt(i % KEY.length)) & 0xff;
      }
      if(typeof TextDecoder !== "undefined"){
        return new TextDecoder("utf-8").decode(bytes);
      }
      var s = "";
      for(var j=0;j<bytes.length;j++) s += String.fromCharCode(bytes[j]);
      return decodeURIComponent(escape(s));
    }catch(e){ return null; }
  }
  window.__wyReady.then(function(ok){
    if(!ok) return;
    document.querySelectorAll("iframe.ch-frame[data-c]").forEach(function(oldF){
      var decoded = _dec(oldF.getAttribute("data-c"));
      if(!decoded) return;
      var newF = document.createElement("iframe");
      for(var i=0;i<oldF.attributes.length;i++){
        var a = oldF.attributes[i];
        if(a.name === "data-c" || a.name === "srcdoc") continue;
        try{ newF.setAttribute(a.name, a.value); }catch(e){}
      }
      newF.setAttribute("srcdoc", decoded);
      try{ oldF.parentNode.replaceChild(newF, oldF); }catch(e){ return; }
      if(typeof window.setupFrame === "function"){
        try{ window.setupFrame(newF); }catch(e){}
      }
    });
    document.querySelectorAll("[data-wytext]").forEach(function(el){
      var t = _dec(el.getAttribute("data-wytext"));
      if(t === null) return;
      el.innerHTML = t;
      el.removeAttribute("data-wytext");
    });
    if(typeof window.resizeAllFrames === "function"){
      [150, 800, 2000].forEach(function(ms){
        setTimeout(function(){ try{ window.resizeAllFrames(); }catch(e){} }, ms);
      });
    }
  });
})();
</script>
