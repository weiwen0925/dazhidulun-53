/* ── 跨 iframe 節層級深連結（#chapter-品-章-節）── */
function wyGotoDeep(hash){
  var m=/^chapter-(\d+)-(\d+)-(\d+)$/.exec(hash);if(!m)return false;
  var sec=document.getElementById('ch-'+m[1]);if(!sec)return false;
  var tries=0;
  (function attempt(){
    tries++;
    var ifr=sec.querySelector('iframe.ch-frame');
    if(ifr&&ifr.contentWindow){try{ifr.contentWindow.postMessage({wyGoto:hash},'*');}catch(e){}}
    else{var r=sec.getBoundingClientRect();window.scrollTo({top:window.scrollY+r.top-20,behavior:'smooth'});}
    if(tries<10)setTimeout(attempt,400);
  })();
  return true;
}
window.addEventListener('hashchange',function(){
  var h=location.hash.slice(1);if(/^chapter-\d+-\d+-\d+$/.test(h))wyGotoDeep(h);});
(function(){var h=location.hash.slice(1);if(!/^chapter-\d+-\d+-\d+$/.test(h))return;
  if(window.__wyReady&&window.__wyReady.then){
    window.__wyReady.then(function(){setTimeout(function(){wyGotoDeep(h);},1300);});
  }else{setTimeout(function(){wyGotoDeep(h);},1300);}})();
/* ── 防複製（外層）── */
(function(){var blk=function(e){e.preventDefault();return false;};
['contextmenu','copy','cut','selectstart','dragstart'].forEach(function(ev){
 document.addEventListener(ev,blk,true);});
document.addEventListener('keydown',function(e){var k=e.key;
 if(e.ctrlKey&&(k==='c'||k==='C'||k==='a'||k==='A'||k==='s'||k==='S'||k==='p'||k==='P'||k==='u'||k==='U'||k==='x'||k==='X'))blk(e);
 if(k==='F12')blk(e);
 if(e.ctrlKey&&e.shiftKey&&(k==='I'||k==='J'||k==='C'||k==='K'))blk(e);},true);})();
</script>

<script id="wy-decoder">
(function(){
  if(!window.__wyReady) return;
  var KEY = "wy-dzdl-53-v1";
  function _dec(b64){
    try{
      var raw = atob(b64);
      var bytes = new Uint8Array(raw.length);
      for(var i=0;i<raw.length;i++){
        bytes[i] = (raw.charCodeAt(i) ^ KEY.charCodeAt(i % KEY.length)) & 0xff;
      }
      if(typeof TextDecoder !== "undefined"){
        return new TextDecoder("utf-8").decode(bytes);
      }
      var s = "";
      for(var j=0;j<bytes.length;j++) s += String.fromCharCode(bytes[j]);
      return decodeURIComponent(escape(s));
    }catch(e){ return null; }
  }
  window.__wyReady.then(function(ok){
    if(!ok) return;
    document.querySelectorAll("iframe.ch-frame[data-c]").forEach(function(oldF){
      var decoded = _dec(oldF.getAttribute("data-c"));
      if(!decoded) return;
      var newF = document.createElement("iframe");
      for(var i=0;i<oldF.attributes.length;i++){
        var a = oldF.attributes[i];
        if(a.name === "data-c" || a.name === "srcdoc") continue;
        try{ newF.setAttribute(a.name, a.value); }catch(e){}
      }
      newF.setAttribute("srcdoc", decoded);
      try{ oldF.parentNode.replaceChild(newF, oldF); }catch(e){ return; }
      if(typeof window.setupFrame === "function"){
        try{ window.setupFrame(newF); }catch(e){}
      }
    });
    document.querySelectorAll("[data-wytext]").forEach(function(el){
      var t = _dec(el.getAttribute("data-wytext"));
      if(t === null) return;
      el.innerHTML = t;
      el.removeAttribute("data-wytext");
    });
    if(typeof window.resizeAllFrames === "function"){
      [150, 800, 2000].forEach(function(ms){
        setTimeout(function(){ try{ window.resizeAllFrames(); }catch(e){} }, ms);
      });
    }
  });
})();
</script>

<script id="wy-search-js">
(function(){
if(document.getElementById('wysFab'))return;
var IDX=null,LOADING=false,ZI=null,ZLOAD=false;
var fab=document.createElement('button');fab.id='wysFab';fab.type='button';fab.setAttribute('aria-label','全站搜尋');
fab.innerHTML='<span class="wysf-ic">搜</span><span class="wysf-ring"></span>';
document.body.appendChild(fab);
var sm=document.createElement('div');sm.id='wysModal';
sm.innerHTML='<div class="wysm-card" role="dialog" aria-modal="true" aria-label="全站搜尋">'
 +'<div class="wysm-orn">❀</div><div class="wysm-title">全站搜尋</div>'
 +'<div class="wysm-sub">品名 · 原典節點 · 全景總表 · 系列導讀</div>'
 +'<iframe class="wysm-if" title="搜尋輸入" scrolling="no"></iframe>'
 +'<div id="wysResults"></div>'
 +'<div class="wysm-foot">Esc 關閉 · 結果皆於新分頁開啟</div></div>';
document.body.appendChild(sm);
var sres=sm.querySelector('#wysResults');
/* 輸入框放同源 iframe:獨立 document,頁面防護層(全域鍵盤/選取攔截)完全不影響打字 */
var ifr=sm.querySelector('.wysm-if'),idoc=ifr.contentDocument;
idoc.open();
idoc.write('<!DOCTYPE html><html><head><link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@400;700&display=swap" rel="stylesheet"><style>html,body{margin:0;padding:0;background:transparent;overflow:hidden;}input{width:100%;box-sizing:border-box;background:transparent;border:none;outline:none;color:#f0e2c4;font-family:"Noto Serif TC",serif;font-size:18px;letter-spacing:2px;padding:10px 4px 12px;caret-color:#e3c085;border-bottom:1px solid rgba(217,184,124,.4);}input:focus{border-bottom-color:#d9b87c;}input::placeholder{color:#7a6a52;letter-spacing:2px;font-size:15px;}input::-webkit-search-cancel-button{-webkit-appearance:none;}</style></head><body><input id="q" type="search" autocomplete="off" placeholder="輸入關鍵詞，多詞可用空格分隔…"/></body></html>');
idoc.close();
var sin=idoc.getElementById('q');

function esc(t){var d=document.createElement('div');d.textContent=t;return d.innerHTML;}
function baseOf(k){
  if(k==='zl')return 'https://weiwen0925.github.io/nagarjuna-mulamadhyamakakarika/';
  return 'https://weiwen0925.github.io/dazhidulun-'+k+'/';
}
function label(k){return k==='zl'?'中論':('卷 '+k);}
function terms(q){return q.split(/[\s,，、・]+/).filter(function(x){return x.length>=1;}).slice(0,5);}
function matchAll(txt,ts){var lo=txt.toLowerCase();
  for(var i=0;i<ts.length;i++){if(lo.indexOf(ts[i].toLowerCase())<0)return false;}return true;}
function hlAll(t,ts){
  var out=esc(t);
  for(var i=0;i<ts.length;i++){
    var e2=esc(ts[i]).replace(/[.*+?^${}()|[\\]\\\\]/g,'\\\\$&');
    out=out.replace(new RegExp('('+e2+')','gi'),'\x01$1\x02');
  }
  return out.replace(/\x01/g,'<b>').replace(/\x02/g,'</b>');
}
function snippet(txt,ts){
  var lo=txt.toLowerCase(),i=-1;
  for(var x=0;x<ts.length;x++){var j=lo.indexOf(ts[x].toLowerCase());if(j>-1&&(i<0||j<i))i=j;}
  if(i<0)i=0;
  var st=Math.max(0,i-22),en=Math.min(txt.length,i+64);
  return (st>0?'…':'')+txt.slice(st,en)+(en<txt.length?'…':'');
}
function loadIdx(){
  if(IDX||LOADING)return;LOADING=true;
  fetch('https://weiwen0925.github.io/dazhidulun-0/search-index.json')
    .then(function(r){if(!r.ok)throw 0;return r.json();})
    .then(function(j){IDX=j||{};})
    .catch(function(){IDX={};})
    .then(function(){LOADING=false;render();});
}
function loadZb(){
  if(ZI||ZLOAD||!IDX||!IDX.zbv||!IDX.zbv.length){if(!ZI&&IDX&&(!IDX.zbv||!IDX.zbv.length))ZI=[];return;}
  ZLOAD=true;
  var items=[],left=IDX.zbv.length;
  IDX.zbv.forEach(function(k){
    fetch(baseOf(k)+'zongbiao.json').then(function(r){if(!r.ok)throw 0;return r.json();})
    .then(function(j){
      var pins=(j&&j.pins)||{};
      Object.keys(pins).forEach(function(pp){
        var d=pins[pp],parts=[];
        if(d.subtitle)parts.push(d.subtitle);
        (d.tables||[]).forEach(function(t){
          if(t.caption)parts.push(t.caption);
          (t.rows||[]).forEach(function(rr){parts.push(rr.join('：'));});
        });
        if(d.note)parts.push(d.note);
        items.push({k:k,p:parseInt(pp,10),title:(d.title||'').replace(/<\/?b>/g,''),
                    txt:parts.join(' ¶ ').replace(/<\/?b>/g,'')});
      });
    }).catch(function(){}).then(function(){if(--left<=0){ZI=items;ZLOAD=false;render();}});
  });
}
function row(cls,tag,href,inner){
  return '<a class="wys-row" href="'+href+'" target="_blank" rel="noopener"><span class="wys-tag '+cls+'">'+tag+'</span>'
    +'<span class="wys-t">'+inner+'</span></a>';
}
function render(){
  var q=(sin.value||'').trim();
  if(!q){sres.innerHTML='';return;}
  var ts=terms(q),h='';
  var pure=/^[\d\s]+$/.test(q);
  if(!IDX){sres.innerHTML='<div class="wys-head">索引載入中…</div>';loadIdx();return;}
  var vols=IDX.vols||{};
  var vm=q.match(/^卷?\s*(\d{1,3})$/);
  var hits=[];
  if(vm&&vols[String(parseInt(vm[1],10))]){
    var k0=String(parseInt(vm[1],10));
    vols[k0].pins.forEach(function(pin){hits.push([k0,pin]);});
  }else if(ts.length&&!pure){
    Object.keys(vols).forEach(function(k){
      if(hits.length>=120)return;
      vols[k].pins.forEach(function(pin){if(matchAll(pin.t,ts))hits.push([k,pin]);});
    });
  }
  if(hits.length){
    h+='<div class="wys-head">品名 · '+hits.length+' 筆 <span class="wys-hint">直達該品</span></div>';
    for(var r=0;r<Math.min(hits.length,10);r++){var k=hits[r][0],pin=hits[r][1];
      h+=row('','' +esc(label(k))+'・品'+pin.p,baseOf(k)+'#'+vols[k].a+'-'+pin.p,hlAll(pin.t,vm?[]:ts));}
    if(hits.length>10)h+='<div class="wys-more">…品名另有 '+(hits.length-10)+' 筆</div>';
  }
  if(!vm&&!pure&&ts.length){
    var nds=IDX.nodes||{},perk={},tot=0;
    var nkeys=Object.keys(nds);
    nkeys.sort(function(a,b){return (a==='zl'?-1:b==='zl'?1:parseInt(a,10)-parseInt(b,10));});
    nkeys.forEach(function(k){
      if(tot>=160)return;
      for(var bi=0;bi<nds[k].length;bi++){var nd=nds[k][bi];
        if(matchAll(nd.t,ts)){(perk[k]=perk[k]||[]).push(nd);tot++;
          if(perk[k].length>=8)break;}}
    });
    var nh=[],ord=Object.keys(perk),rd=0,added=true;
    while(nh.length<60&&added){added=false;
      for(var oi=0;oi<ord.length;oi++){var pa=perk[ord[oi]];
        if(pa.length>rd){nh.push([ord[oi],pa[rd]]);added=true;}}
      rd++;}
    if(nh.length){
      h+='<div class="wys-head">原典節點 · '+nh.length+' 筆 <span class="wys-hint">直達該節</span></div>';
      for(var r2=0;r2<Math.min(nh.length,10);r2++){var kk=nh[r2][0],nd=nh[r2][1];
        h+=row('wys-tag3',esc(label(kk)),baseOf(kk)+'#'+esc(nd.a),hlAll(nd.t,ts));}
      if(nh.length>10)h+='<div class="wys-more">…節點另有 '+(nh.length-10)+' 筆</div>';
    }
    var es2=IDX.essays||[],eh=[];
    for(var c2=0;c2<es2.length&&eh.length<40;c2++){var it3=es2[c2];
      if(matchAll(it3.t+' '+it3.x,ts))eh.push(it3);}
    if(eh.length){
      h+='<div class="wys-head">系列導讀 · '+eh.length+' 篇 <span class="wys-hint">開啟文章</span></div>';
      for(var r4=0;r4<Math.min(eh.length,8);r4++){var it4=eh[r4];
        h+=row('wys-tag4','導讀 '+it4.n,'https://weiwen0925.github.io/medium-import-'+it4.n+'.html',
          '<span class="wys-tt">'+esc(it4.t.slice(0,30))+'</span><br>'+hlAll(snippet(it4.x,ts),ts));}
      if(eh.length>8)h+='<div class="wys-more">…導讀另有 '+(eh.length-8)+' 篇</div>';
    }
    if(!ZI){h+='<div class="wys-head">總表內容 · 索引載入中…</div>';loadZb();}
    else{
      var zperk={},ztot=0;
      for(var z=0;z<ZI.length&&ztot<160;z++){var it=ZI[z];
        if(matchAll(it.title+' '+it.txt,ts)){
          var zk=String(it.k);
          if((zperk[zk]=zperk[zk]||[]).length<6){zperk[zk].push(it);ztot++;}}}
      var zh=[],zord=Object.keys(zperk),zrd=0,zadd=true;
      zord.sort(function(a,b){return (a==='zl'?-1:b==='zl'?1:parseInt(a,10)-parseInt(b,10));});
      while(zh.length<80&&zadd){zadd=false;
        for(var zo=0;zo<zord.length;zo++){var zpa=zperk[zord[zo]];
          if(zpa.length>zrd){zh.push(zpa[zrd]);zadd=true;}}
        zrd++;}
      if(zh.length){
        h+='<div class="wys-head">總表內容 · '+zh.length+' 筆 <span class="wys-hint">達該品(右下有總表鈕)</span></div>';
        for(var r3=0;r3<Math.min(zh.length,12);r3++){var it2=zh[r3];
          var vk=vols[it2.k];
          h+=row('wys-tag2',esc(label(it2.k))+'・品'+it2.p,baseOf(it2.k)+'#'+((vk&&vk.a)||'chapter')+'-'+it2.p,
            '<span class="wys-tt">'+esc(it2.title.slice(0,26))+'</span><br>'+hlAll(snippet(it2.txt,ts),ts));}
        if(zh.length>12)h+='<div class="wys-more">…總表另有 '+(zh.length-12)+' 筆</div>';
      }
    }
  }
  sres.innerHTML=h||'<div class="wys-head">無結果 · 換個關鍵詞試試</div>';
}

function fabPlace(){ /* 避讓左側固定導覽欄(sb-nav 等):排到欄右側 12px */
  var right=0,cands=document.querySelectorAll('[class*="sb"],[class*="side"],[class*="rail"],nav,aside');
  for(var i=0;i<cands.length;i++){var el=cands[i];
    if(el===fab||sm.contains(el))continue;
    var st;try{st=getComputedStyle(el);}catch(_){continue;}
    if(st.position!=='fixed'&&st.position!=='sticky')continue;
    var r=el.getBoundingClientRect();
    if(r.left<48&&r.width>0&&r.width<150&&r.height>200&&r.right>right)right=r.right;
  }
  fab.style.left=(right>0?Math.round(right)+12:24)+'px';
}
function fabShow(){fab.classList.toggle('show',window.scrollY>250);fabPlace();}
setInterval(fabPlace,1500);
window.addEventListener('scroll',fabShow,{passive:true});
setTimeout(fabShow,600);setTimeout(fabShow,2000);
})();
</script>
