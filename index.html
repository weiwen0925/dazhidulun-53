*{box-sizing:border-box;}
html,body{scrollbar-width:none;-ms-overflow-style:none;}

html{scroll-behavior:smooth;}
body{

  -webkit-user-select:none; -moz-user-select:none; -ms-user-select:none; user-select:none;
  -webkit-touch-callout:none;
}

#sb{position:fixed;left:0;top:0;width:var(--sbW);height:100vh;background:var(--sbBg);
  color:var(--sbText);z-index:100;display:flex;flex-direction:column;align-items:center;

#sb::-webkit-scrollbar{display:none;}
.sb-brand{position:sticky;top:0;width:100%;font-family:"Noto Sans TC",sans-serif;
  text-align:center;line-height:1.5;
  background:linear-gradient(to bottom,var(--sbBg) 80%,rgba(30,26,20,0));
  padding:14px 4px 12px;margin-bottom:6px;z-index:5;text-decoration:none;cursor:pointer;
  transition:color .25s;display:block;border-bottom:1px solid rgba(184,134,11,.25);}
.sb-brand:hover{color:var(--goldL);}
.sb-brand .sb-brand-line1{display:block;font-size:11px;letter-spacing:1.5px;color:var(--gold);opacity:.85;}
.sb-brand .sb-brand-line2{display:block;font-size:14px;font-weight:700;letter-spacing:2px;color:var(--goldL);margin-top:2px;}
.sb-brand .sb-brand-arrow{display:block;font-size:10px;color:var(--goldL);opacity:.7;margin-top:3px;
  border:1px solid rgba(184,134,11,.5);border-radius:10px;padding:1px 0;background:rgba(184,134,11,.12);}
.sb-nav{width:100%;display:flex;flex-direction:column;align-items:center;gap:3px;margin-top:4px;}
.sb-item{display:flex;flex-direction:column;align-items:center;gap:3px;width:100%;
  padding:5px 4px;text-decoration:none;color:var(--sbText);border-radius:8px;
  transition:background .2s,color .2s;cursor:pointer;}
.sb-item:hover{background:rgba(184,134,11,.16);}
.sb-item.active{background:rgba(184,134,11,.9);color:#fff;box-shadow:0 0 14px rgba(184,134,11,.5);}
.sb-item.active .sb-circle{border-color:#fff;color:#fff;}
.sb-circle{width:34px;height:34px;border-radius:50%;border:1.5px solid var(--goldL);
  display:flex;align-items:center;justify-content:center;font-family:"Noto Sans TC",sans-serif;
  font-size:16px;font-weight:600;}
.sb-label{font-size:12px;letter-spacing:.3px;text-align:center;line-height:1.3;opacity:.9;}
#sbToggle{display:none;}
/* ───── Main ───── */

.site-hero{position:relative;background:var(--headGrad);color:#f4ead5;text-align:center;

.hero-kick,.hero-en{position:relative;font-family:"Noto Sans TC",sans-serif;
  font-size:14px;letter-spacing:4px;color:var(--goldL);opacity:.92;}
.hero-en{font-size:12px;letter-spacing:3px;margin-top:18px;opacity:.6;}
.hero-title{position:relative;font-size:56px;font-weight:900;color:#f4ead5;margin:18px 0 14px;

.hero-sub{position:relative;font-size:20px;color:#e7d8b6;letter-spacing:2px;}
.hero-meta{position:relative;font-size:16px;color:#cbb88f;margin-top:14px;letter-spacing:1px;}
.hero-range{position:relative;display:inline-block;margin-top:22px;font-family:"Noto Sans TC",sans-serif;
  font-size:14px;letter-spacing:2px;color:var(--goldL);border:1px solid rgba(184,134,11,.5);
  border-radius:20px;padding:6px 20px;background:rgba(184,134,11,.1);}
/* ───── Preface ───── */
.preface{max-width:860px;margin:46px auto 10px;padding:0 28px;}
.preface-title{text-align:center;font-size:30px;font-weight:700;color:var(--accent);letter-spacing:4px;}
.preface-rule{width:60px;height:3px;background:var(--gold);margin:14px auto 26px;border-radius:2px;}
.preface p{font-size:19px;line-height:2.1;color:var(--text2);margin:0 0 18px;text-align:justify;}
/* ───── TOC ───── */
.toc-section{max-width:1100px;margin:40px auto 10px;padding:0 28px;}
.toc-title{text-align:center;font-size:34px;font-weight:700;color:var(--accent);letter-spacing:6px;}
.toc-desc{text-align:center;font-size:17px;color:var(--text-muted);margin:12px 0 28px;letter-spacing:1px;}
.toc-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:16px;}
.toc-card{display:flex;gap:16px;align-items:flex-start;background:var(--card);border:1px solid var(--border);
  border-radius:10px;padding:18px 20px;text-decoration:none;color:var(--text);
  box-shadow:0 1px 3px rgba(0,0,0,.06);transition:transform .2s,box-shadow .2s,border-color .2s;}
.toc-card:hover{transform:translateY(-3px);box-shadow:0 6px 20px rgba(91,58,41,.14);border-color:var(--gold);}
.toc-num{flex:0 0 auto;width:44px;height:44px;border-radius:50%;background:var(--headGrad);color:var(--goldL);
  display:flex;align-items:center;justify-content:center;font-family:"Noto Sans TC",sans-serif;
  font-size:19px;font-weight:700;}
.toc-text{flex:1;}
.toc-name{font-size:19.5px;font-weight:700;line-height:1.6;color:var(--accent);}
.toc-card-sub{font-size:15px;color:var(--text-muted);margin-top:6px;line-height:1.6;}
/* ───── Chapter ───── */
.chapter{margin:30px 0 0;}
.ch-head{background:var(--headGrad);color:#f4ead5;text-align:center;padding:48px 24px 40px;position:relative;}
.ch-num{font-family:"Noto Sans TC",sans-serif;font-size:18px;letter-spacing:3px;color:var(--goldL);}
.ch-name{font-size:34px;font-weight:900;margin:14px 0 8px;letter-spacing:2px;text-shadow:0 2px 10px rgba(0,0,0,.3);}
.ch-sub{font-size:17px;color:#e0cfa6;letter-spacing:1px;}
.ch-deco{width:80px;height:3px;background:var(--gold);margin:22px auto 0;border-radius:2px;}
.ch-body{max-width:980px;margin:0 auto;padding:34px 28px 26px;}
/* ───── Bridge ───── */
.bridge{background:linear-gradient(135deg,#fffdf5,#f5ecd8);border:1px solid var(--border);
  border-left:5px solid var(--gold);border-radius:10px;padding:20px 26px;margin:0 0 26px;
  box-shadow:0 2px 10px rgba(91,58,41,.06);}
.bridge-outro{border-left-color:var(--accentL);background:linear-gradient(135deg,#fdf8e8,#f2e6c8);
  margin-top:30px;margin-bottom:14px;}
.bridge-label{display:inline-block;font-family:"Noto Sans TC",sans-serif;font-size:12.5px;
  background:var(--gold);color:#fff;padding:3px 14px;border-radius:12px;letter-spacing:2.2px;margin-bottom:12px;}
.bridge-outro .bridge-label{background:var(--accent);}
.bridge p{margin:0;color:var(--text2);line-height:2.1;font-size:18.5px;text-align:justify;}
.bridge b{color:var(--accent-red);}
/* ───── iframe ───── */
.ch-frame{display:block;width:100%;border:0;background:#fffdf7;border:1px solid var(--border);
  border-radius:12px;box-shadow:0 4px 20px rgba(91,58,41,.1);margin:0 0 8px;min-height:180px;}
.next-link{display:inline-block;margin:6px 0 0;font-family:"Noto Sans TC",sans-serif;font-size:17px;
  color:var(--accent);text-decoration:none;border:1px solid var(--border);border-radius:20px;
  padding:8px 22px;background:var(--card);transition:background .2s,color .2s,border-color .2s;}

.read-progress .rp-pct{font-weight:600;min-width:38px;text-align:right;font-size:13px;}

#backTop{position:fixed;right:22px;bottom:22px;width:46px;height:46px;border-radius:50%;border:none;
  background:var(--headGrad);color:var(--goldL);font-size:22px;cursor:pointer;z-index:120;
  display:none;align-items:center;justify-content:center;box-shadow:0 4px 16px rgba(0,0,0,.3);}
#backTop.show{display:flex;}
/* ───── Footer ───── */
.site-footer{text-align:center;padding:40px 24px 90px;color:var(--text-muted);font-size:15px;
  font-family:"Noto Sans TC",sans-serif;letter-spacing:1px;border-top:1px solid var(--border-light);
  margin-top:30px;}
/* ───── RWD ───── */
@media(max-width:900px){
  #sb{transform:translateX(-100%);transition:transform .3s;}
  #sb.open{transform:translateX(0);}
  .main{margin-left:0;}
  #sbToggle{display:flex;position:fixed;left:14px;top:14px;z-index:130;width:42px;height:42px;
    border-radius:8px;border:none;background:var(--sbBg);color:var(--goldL);font-size:20px;
    align-items:center;justify-content:center;cursor:pointer;box-shadow:0 2px 8px rgba(0,0,0,.3);}
  .hero-title{font-size:38px;} .ch-name{font-size:26px;}
  .toc-grid{grid-template-columns:1fr;}
}

<script>
/* ── 進度條 ── */
var rpFill=document.getElementById('rpFill'),rpPct=document.getElementById('rpPct');
function updateProgress(){var sh=document.documentElement.scrollHeight-window.innerHeight;
 var pct=sh>0?Math.min(100,Math.max(0,window.scrollY/sh*100)):0;
 if(rpFill)rpFill.style.width=pct+'%';if(rpPct)rpPct.textContent=Math.round(pct)+'%';}
window.addEventListener('scroll',updateProgress,{passive:true});updateProgress();
/* ── 接近頁尾淡出 ── */
(function(){var cap=document.getElementById('readProgress');if(!cap)return;
 function setHide(on){cap.classList.toggle('hide-near-end',!!on);}
 var targets=[];var f2=document.querySelector('.site-footer');if(f2)targets.push(f2);
 if(!targets.length)return;
 if('IntersectionObserver' in window){
  var io=new IntersectionObserver(function(es){setHide(es.some(function(e){return e.isIntersecting;}));},
   {root:null,rootMargin:'0px 0px -20px 0px',threshold:0.01});
  targets.forEach(function(t){io.observe(t);});
 }else{var ck=function(){var dh=document.documentElement.scrollHeight;
  setHide(dh-(window.scrollY+window.innerHeight)<240);};
  window.addEventListener('scroll',ck,{passive:true});ck();}})();
/* ── iframe 自動高度（viewport/content 解耦）── */
function resizeFrame(f){try{var d=f.contentDocument||f.contentWindow.document;
 if(!d||!d.body)return;d.body.style.minHeight='0';d.body.style.height='auto';
 if(d.documentElement){d.documentElement.style.minHeight='0';d.documentElement.style.height='auto';}
 var h=d.body.scrollHeight;if(h>100){f.style.height=h+'px';f.style.minHeight='0';}}catch(e){}}
function resizeAllFrames(){document.querySelectorAll('iframe.ch-frame').forEach(resizeFrame);
 if(typeof updateProgress==='function')updateProgress();}
function setupFrame(f){var tries=0;function tick(){tries++;resizeFrame(f);if(tries<30)setTimeout(tick,200);}
 if(f.contentDocument&&f.contentDocument.readyState==='complete'){tick();}else{f.addEventListener('load',tick);}}
document.querySelectorAll('iframe.ch-frame').forEach(setupFrame);
var rzT;window.addEventListener('resize',function(){clearTimeout(rzT);rzT=setTimeout(resizeAllFrames,200);});
/* ── 錨點防錯跳 ── */
document.addEventListener('click',function(e){var a=e.target;while(a&&a.tagName!=='A')a=a.parentElement;
 if(!a)return;var h=a.getAttribute('href');if(!h||h.charAt(0)!=='#'||h.length<2)return;
 var id=h.substring(1);var el=document.getElementById(id);if(!el)return;e.preventDefault();
 resizeAllFrames();setTimeout(function(){resizeAllFrames();var rect=el.getBoundingClientRect();
  var y=window.scrollY+rect.top-20;window.scrollTo({top:y,behavior:'smooth'});},60);},true);
var _rt=0,_riv=setInterval(function(){_rt++;resizeAllFrames();if(_rt>50)clearInterval(_riv);},300);
/* ── 側欄高亮 ── */
var sbItems=document.querySelectorAll('.sb-item'),chapters=document.querySelectorAll('section.chapter');
function highlight(){var idx=-1;chapters.forEach(function(c,i){
  if(c.getBoundingClientRect().top<window.innerHeight*0.35)idx=i;});
 sbItems.forEach(function(it,i){it.classList.toggle('active',i===idx);});}
window.addEventListener('scroll',highlight,{passive:true});highlight();
/* ── 回頂 / brand / 漢堡 ── */
var backTop=document.getElementById('backTop');
window.addEventListener('scroll',function(){if(backTop)backTop.classList.toggle('show',window.scrollY>600);},{passive:true});
if(backTop)backTop.addEventListener('click',function(){window.scrollTo({top:0,behavior:'smooth'});});
var sbBrand=document.getElementById('sbBrand');
if(sbBrand)sbBrand.addEventListener('click',function(e){e.preventDefault();window.scrollTo({top:0,behavior:'smooth'});});
var sbToggle=document.getElementById('sbToggle'),sb=document.getElementById('sb');
if(sbToggle&&sb)sbToggle.addEventListener('click',function(){sb.classList.toggle('open');});
/* ── 防複製（外層）── */
(function(){var blk=function(e){e.preventDefault();return false;};
['contextmenu','copy','cut','selectstart','dragstart'].forEach(function(ev){
 document.addEventListener(ev,blk,true);});
document.addEventListener('keydown',function(e){var k=e.key;
 if(e.ctrlKey&&(k==='c'||k==='C'||k==='a'||k==='A'||k==='s'||k==='S'||k==='p'||k==='P'||k==='u'||k==='U'||k==='x'||k==='X'))blk(e);
 if(k==='F12')blk(e);
 if(e.ctrlKey&&e.shiftKey&&(k==='I'||k==='J'||k==='C'||k==='K'))blk(e);},true);})();
</script>

<script id="wy-print-intercept">
(function(){
  try{ window.print = function(){}; }catch(e){}
  document.addEventListener("keydown", function(e){
    if((e.metaKey||e.ctrlKey) && (e.key==="p"||e.key==="P"||e.keyCode===80)){
      e.preventDefault(); e.stopPropagation();
      return false;
    }
  }, true);
})();
</script>
<script id="wy-decoder">
(function(){
  if(!window.__wyReady) return;
  var KEY = "wy-dzdl-53-v1";
  function _dec(b64){
    try{
      var raw = atob(b64);
      var bytes = new Uint8Array(raw.length);
      for(var i=0;i<raw.length;i++){
        bytes[i] = (raw.charCodeAt(i) ^ KEY.charCodeAt(i % KEY.length)) & 0xff;
      }
      if(typeof TextDecoder !== "undefined"){
        return new TextDecoder("utf-8").decode(bytes);
      }
      var s = "";
      for(var j=0;j<bytes.length;j++) s += String.fromCharCode(bytes[j]);
      return decodeURIComponent(escape(s));
    }catch(e){ return null; }
  }
  window.__wyReady.then(function(ok){
    if(!ok) return;
    document.querySelectorAll("iframe.ch-frame[data-c]").forEach(function(oldF){
      var decoded = _dec(oldF.getAttribute("data-c"));
      if(!decoded) return;
      var newF = document.createElement("iframe");
      for(var i=0;i<oldF.attributes.length;i++){
        var a = oldF.attributes[i];
        if(a.name === "data-c" || a.name === "srcdoc") continue;
        try{ newF.setAttribute(a.name, a.value); }catch(e){}
      }
      newF.setAttribute("srcdoc", decoded);
      try{ oldF.parentNode.replaceChild(newF, oldF); }catch(e){ return; }
      if(typeof window.setupFrame === "function"){
        try{ window.setupFrame(newF); }catch(e){}
      }
    });
    document.querySelectorAll("[data-wytext]").forEach(function(el){
      var t = _dec(el.getAttribute("data-wytext"));
      if(t === null) return;
      el.innerHTML = t;
      el.removeAttribute("data-wytext");
    });
    if(typeof window.resizeAllFrames === "function"){
      [150, 800, 2000].forEach(function(ms){
        setTimeout(function(){ try{ window.resizeAllFrames(); }catch(e){} }, ms);
      });
    }
  });
})();
</script>
